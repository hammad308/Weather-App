<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <label style="font-size: 2.5rem; margin: 1rem;text-align:center; color:rgb(238, 229, 238);">Weather App</label>
    <div class="weather-container">
        <div class="Weather-showing-elements" hidden>
            <label id="location"></label>
            <div style="margin-top:2rem; display: flex; align-items: center; justify-content: center; gap:20rem;">
                <label id="main-temperature" style="font-size: 2rem;"></label>
                <div style="display:flex; align-items:center;justify-content: center; gap: 1rem;">
                    <img id="weather-icon" src="" style="font-size: 2rem;" alt="Weather Icon" />
                    <label id="weather-main" style="font-size: 2rem;"></label>
                </div>
            </div>
            <hr style="margin: 2rem 0;" />
            <div style="margin-top:2rem; display: flex; align-items: center; justify-content: center; gap:20rem;">
                <label id="humidity" style="font-size: 1.3rem;"></label>
                <label id="feels-like" style="font-size: 1.3rem;"></label>
            </div>
            <div style="margin:4rem; display: flex; align-items: center; flex-direction:column;justify-content: center; gap:1.5rem; margin-bottom: 2rem;">
                <label id="wind" style=" font-size: 1.3rem;"></label>
                <label id="wind-gust" style=" font-size: 1.3rem;"></label>
            </div>
            


        </div>
    </div>
    <div class="weather-options">
        <label id="weather-label">WEATHER FOR: </label>
        <select id="weather-cities">
            <option value=""></option>
            <option value="new york">New York</option>
            <option value="los angeles">Los Angeles</option>
            <option value="chicago">Chicago</option>
            <option value="paris">Paris</option>
            <option value="tokyo">Tokyo</option>
            <option value="london">London</option>
            <option value="multan">Multan</option>
        </select>
        <button id="get-weather-btn">Get Weather</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
